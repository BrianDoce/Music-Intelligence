version: 2

sources:
  - name: bronze
    database: MusicIntelligence
    schema: bronze

    tables:
      - name: bronze_artists
        description: "Raw Spotify artist JSON data loaded from S3"

      - name: bronze_albums
        description: "Raw Spotify album JSON data loaded from S3"

      - name: bronze_tracks
        description: "Raw Spotify track JSON data loaded from S3"
    freshness:
      warn_after:
        count: 1
        period: day